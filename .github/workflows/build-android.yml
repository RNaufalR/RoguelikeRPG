name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Show java and javac versions
        run: |
          java -version
          javac -version

      - name: Initialize Android platform
        run: |
          npx cap add android
          npx cap sync android

      - name: Force Java 17 in generated Android Gradle files
        # Make sure any generated build.gradle / build.gradle.kts files that mention Java 21 are changed to 17,
        # and replace Kotlin jvmTarget "21" -> "17".
        run: |
          set -e
          # only operate if android directory exists
          if [ -d "android" ]; then
            echo "Patching Android Gradle files to use Java 17..."
            # replace textual occurrences - safe no-op if not present
            find android -type f \( -name "build.gradle" -o -name "build.gradle.kts" -o -name "*.gradle" -o -name "*.kts" \) -print0 \
              | xargs -0 -n1 sed -i \
                -e 's/JavaVersion\.VERSION_21/JavaVersion.VERSION_17/g' \
                -e 's/sourceCompatibility = 21/sourceCompatibility = 17/g' \
                -e 's/targetCompatibility = 21/targetCompatibility = 17/g' \
                -e 's/sourceCompatibility = JavaVersion.VERSION_21/sourceCompatibility = JavaVersion.VERSION_17/g' \
                -e 's/targetCompatibility = JavaVersion.VERSION_21/targetCompatibility = JavaVersion.VERSION_17/g' \
                -e 's/jvmTarget = "21"/jvmTarget = "17"/g' \
                -e "s/jvmTarget = '21'/jvmTarget = '17'/g" \
                -e 's/kotlinOptions.jvmTarget = "21"/kotlinOptions.jvmTarget = "17"/g' \
                -e "s/kotlinOptions.jvmTarget = '21'/kotlinOptions.jvmTarget = '17'/g" || true
            echo "Patch completed."
          else
            echo "No android directory found — skipping patch step."
          fi

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
